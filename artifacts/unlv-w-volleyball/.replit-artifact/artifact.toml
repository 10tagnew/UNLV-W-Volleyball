kind = "web"
previewPath = "/"
title = "UNLV W Volleyball"
version = "1.0.0"
id = "artifacts/unlv-w-volleyball"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20513

[services.development]
run = "pnpm --filter @workspace/unlv-w-volleyball run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/unlv-w-volleyball", "run", "build" ]
publicDir = "artifacts/unlv-w-volleyball/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20513"
BASE_PATH = "/"
